name: Deploy aws-auth

on:
  workflow_dispatch:

#on:
#  workflow_run:
#    workflows: ["Deploy Infrastructure"]
#    types:
#      - completed

permissions:
  id-token: write
  contents: read

jobs:
  aws-auth:
    #if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/${{ github.event.workflow_run.inputs.environment }}/aws-auth

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::865809098262:role/GitHubRunnerRole
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Init
        run: |
          terraform init -upgrade -reconfigure \
            -backend-config="bucket=cloudex-terraform-state-bucket" \
            -backend-config="key=eks/${{ github.event.workflow_run.inputs.environment }}/terraform.tfstate" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=terraform-lock"

      - name: Apply aws-auth
        run: terraform apply -auto-approve -target=kubernetes_config_map.aws_auth