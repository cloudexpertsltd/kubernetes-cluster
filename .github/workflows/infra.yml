name: Deploy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

permissions:
  id-token: write     # REQUIRED for OIDC
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/envs/${{ github.event.inputs.environment }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::865809098262:role/GitHubRunnerRole
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
         
      - name: Terraform Init
        run: |
          terraform init -upgrade -reconfigure \
            -backend-config="key=eks/${{ github.event.inputs.environment }}/terraform.tfstate" \
            -backend-config="bucket=cloudex-terraform-state-bucket" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="dynamodb_table=terraform-lock"
      
      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="cluster_name=my-eks-cluster"

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -var="cluster_name=my-eks-cluster"